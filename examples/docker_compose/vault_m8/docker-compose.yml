services:
  # One-shot cert generator: creates local.crt/local.key if they don't exist.
  # Traefik waits for this before starting. Skipped automatically when certs already exist.
  # For browser-trusted certs: install mkcert, then run: bash init.sh --rotate-certs
  cert-init:
    image: alpine
    volumes:
      - ./traefik/certs:/certs
    command:
      - sh
      - -c
      - |
        if [ -f /certs/local.crt ]; then
          echo "==> cert-init: certs found, skipping"; exit 0
        fi
        apk add --no-cache --quiet openssl
        openssl req -x509 -newkey rsa:2048 -nodes \
          -keyout /certs/local.key -out /certs/local.crt \
          -days 365 -subj "/CN=localhost" \
          -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
        chmod 600 /certs/local.key && chmod 644 /certs/local.crt
        echo "==> cert-init: self-signed cert ready (browsers will warn)"
        echo "    For trusted certs: mkcert -install, then bash init.sh --rotate-certs"
    restart: "no"

  traefik:
    image: traefik:v3.3
    ports:
      - "8000:80"
      - "4430:443/tcp"
      - "4430:443/udp"  # HTTP/3 / QUIC
      - "127.0.0.1:8080:8080"   # Dashboard — localhost only
      - "${API_BIND_IP:-127.0.0.1}:9000:9000"   # services entryPoint — override API_BIND_IP for LAN/public exposure
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic_conf.yml:/etc/traefik/dynamic_conf.yml:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    depends_on:
      cert-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - m8_app_network

  # Hardened Vault image (UBI9). Update to hashicorp/vault:2.x-ubi when released.
  # Running in dev mode for local use — data is in-memory and repopulated on restart.
  # For production: switch to server mode with file/raft storage and proper unseal.
  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    entrypoint: ["vault"]
    command:
      - server
      - -dev
      - -dev-listen-address=0.0.0.0:8200
      - -log-level=warn
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_TOKEN}
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "127.0.0.1:8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped
    networks:
      - m8_app_network

  # One-shot init container: writes secrets to Vault after it is healthy.
  # Runs once per 'docker compose up'. Re-run with: docker compose start vault_init
  # after a vault restart (dev mode wipes in-memory state on container restart).
  vault_init:
    image: hashicorp/vault:1.17
    entrypoint: ["/bin/sh"]
    command: ["/vault-scripts/vault-init.sh"]
    volumes:
      - ./vault/scripts:/vault-scripts:ro
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_TOKEN}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"
    networks:
      - m8_app_network

  m8_db:
    image: postgres:16-alpine
    volumes:
      - ./db_data:/var/lib/postgresql/data
      - ../shared/db_init:/docker-entrypoint-initdb.d:ro
    env_file:
      - ./.env                          # exposes all .env vars so init-db.sh can discover DB triplets
    environment:
      - POSTGRES_USER=${DB_USER}        # engine bootstrap — required by the official postgres image
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGPORT=${DB_PORT}
    ports:
      - "127.0.0.1:${DB_PORT}:${DB_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p ${DB_PORT} -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - m8_app_network

  redis_cache:
    image: redis:7.4-alpine
    volumes:
      - ./redis/redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'
    command:
      - sh
      - -c
      - |
        redis-server --save 20 1 --loglevel warning --requirepass "${REDIS_PASSWORD}" &
        until redis-cli ping 2>/dev/null | grep -q PONG; do sleep 0.2; done
        redis-cli ACL SETUSER appuser on \>"${REDIS_PASSWORD}" "~*" +@all
        wait
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDISCLI_AUTH=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - m8_app_network

  prometheus:
    image: ubuntu/prometheus:3.11-24.04_stable
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - m8_app_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0-25530058790
    depends_on:
      - prometheus
    env_file:
      - ./grafana/config.monitoring
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - m8_app_network
    restart: unless-stopped

  auth_user_service:
    # Published image — no local build required.
    # For production, pin to a specific release instead of latest:
    #   image: tepochtli/fa-auth-m8:0.9.0
    image: tepochtli/fa-auth-m8:latest
    env_file:
      - ./auth.env
    environment:
      # Vault config set here (not in auth.env) — pydantic extra="forbid" rejects
      # unknown dotenv keys, but OS env vars are looked up by field name and bypass
      # validation. VaultProvider reads these via os.getenv() at startup.
      SECRET_PROVIDER: vault
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_TOKEN}
    volumes:
      - ./auth.env:/opt/auth_user_service/.env:ro
      - ./shared_migrations:/opt/shared_migrations
      - ./keys:/opt/keys:ro
    labels:
      - "traefik.enable=true"
    depends_on:
      m8_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
      vault_init:
        condition: service_completed_successfully
    networks:
      - m8_app_network

  fastapi_service:
    build:
      context: ../../
      dockerfile: ./fastapi_service/Dockerfile
    env_file:
      - ./api.env
    volumes:
      - ../../fastapi_service:/opt/fastapi_service
      - ./api.env:/opt/fastapi_service/.env:ro
      - ./shared_migrations:/opt/shared_migrations
    labels:
      - "traefik.enable=true"
    depends_on:
      m8_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
      auth_user_service:
        condition: service_started
    networks:
      - m8_app_network

networks:
  m8_app_network:
    driver: bridge
