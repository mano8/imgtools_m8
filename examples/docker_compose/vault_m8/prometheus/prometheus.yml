global:
  scrape_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:

  - job_name: traefik
    static_configs:
      - targets:
          - traefik:8082

  - job_name: auth_user_service
    metrics_path: /user/metrics
    static_configs:
      - targets:
          - auth_user_service:8000

  - job_name: fastapi_service
    metrics_path: /fastapi/metrics
    static_configs:
      - targets:
          - fastapi_service:8000
