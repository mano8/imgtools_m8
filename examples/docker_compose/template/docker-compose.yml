services:
  traefik:
    image: traefik:v3.3
    ports:
      - "8000:80"
      - "4430:443"
      - "127.0.0.1:8080:8080"   # Dashboard — localhost only
      - "${API_BIND_IP:-127.0.0.1}:9000:9000"   # services entryPoint — override API_BIND_IP for LAN/public exposure
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic_conf.yml:/etc/traefik/dynamic_conf.yml:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    restart: unless-stopped
    networks:
      - m8_app_network

  m8_db:
    image: mariadb:12-ubi
    volumes:
      - ./mysql_db://var/lib/mysql
    environment:
      - MARIADB_ALLOW_EMPTY_ROOT_PASSWORD=0
      - MARIADB_PORT_NUMBER=${DB_PORT}
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_USER=${DB_USER}
      - MARIADB_PASSWORD=${DB_PASSWORD}
      - MARIADB_DATABASE=${DB_DATABASE}
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MARIADB_ROOT_PASSWORD mariadb-admin ping -h localhost -u root"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - m8_app_network

  
  redis_cache:
    image: redis:7.4-alpine
    volumes:
      - ./redis/redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'
    command:
      - sh
      - -c
      - |
        redis-server --save 20 1 --loglevel warning --requirepass "${REDIS_PASSWORD}" &
        until redis-cli -a "${REDIS_PASSWORD}" ping 2>/dev/null | grep -q PONG; do sleep 0.2; done
        redis-cli -a "${REDIS_PASSWORD}" ACL SETUSER appuser on \>"${REDIS_PASSWORD}" "~*" +@all
        wait
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - m8_app_network
  
  
  prometheus:
    image: ubuntu/prometheus:3.11-24.04_stable

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/data:/prometheus

    ports:
      - "127.0.0.1:9090:9090"

    networks:
      - m8_app_network

    restart: unless-stopped
  
  grafana:
    image: grafana/grafana:13.1.0-25530058790

    depends_on:
      - prometheus

    env_file:
      - ./grafana/config.monitoring

    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

    ports:
      - "127.0.0.1:3000:3000"

    networks:
      - m8_app_network

    restart: unless-stopped
  
  auth_user_service:
    build:
      context: ../../../
      dockerfile: ./auth_user_service/Dockerfile
    env_file:
      - ./auth.env
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      API_PREFIX: ${API_PREFIX}
      SET_OPEN_API: ${SET_OPEN_API}
      SET_DOCS: ${SET_DOCS}
      SET_REDOC: ${SET_REDOC}
      BACKEND_HOST: ${BACKEND_HOST}
      FRONTEND_HOST: ${FRONTEND_HOST}
      SELECTED_DB: ${SELECTED_DB}
      DB_HOST: ${DB_HOST}
      DB_DATABASE: ${DB_DATABASE}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      REDIS_USER: ${REDIS_USER}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      FIRST_SUPERUSER: ${FIRST_SUPERUSER}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD}
      ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY:-}
      ACCESS_PRIVATE_KEY: ${ACCESS_PRIVATE_KEY:-}
      ACCESS_PUBLIC_KEY: ${ACCESS_PUBLIC_KEY:-}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY}
      ACCESS_TOKEN_ALGORITHM: ${ACCESS_TOKEN_ALGORITHM:-HS256}
      REFRESH_TOKEN_ALGORITHM: ${REFRESH_TOKEN_ALGORITHM:-HS256}
      TOKEN_MODE: ${TOKEN_MODE:-stateful}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ../../../auth_user_service:/opt/auth_user_service
      - ./auth.env:/opt/auth_user_service/.env:ro
      - ./shared_migrations:/opt/shared_migrations
      - ./auth_user/static:/opt/auth_user_service/app/static
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth-router.entrypoints=api,websecure"
      - "traefik.http.services.auth-router.loadbalancer.server.port=8000"
    depends_on:
      m8_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    networks:
      - m8_app_network

  fastapi_service:
    build:
      context: ../../
      dockerfile: .\fastapi_service\Dockerfile
    env_file:
      - ./api.env
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      API_PREFIX: ${API_PREFIX}
      SET_OPEN_API: ${SET_OPEN_API}
      SET_DOCS: ${SET_DOCS}
      SET_REDOC: ${SET_REDOC}
      BACKEND_HOST: ${BACKEND_HOST}
      FRONTEND_HOST: ${FRONTEND_HOST}
      SELECTED_DB: ${SELECTED_DB}
      DB_HOST: ${DB_HOST}
      DB_DATABASE: ${DB_DATABASE}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      REDIS_USER: ${REDIS_USER}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      FIRST_SUPERUSER: ${FIRST_SUPERUSER}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD}
      ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY:-}
      ACCESS_PUBLIC_KEY: ${ACCESS_PUBLIC_KEY:-}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY}
      ACCESS_TOKEN_ALGORITHM: ${ACCESS_TOKEN_ALGORITHM:-HS256}
      TOKEN_MODE: ${TOKEN_MODE:-stateful}
      AUTH_PREFIX: ${AUTH_PREFIX}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ../../fastapi_service:/opt/fastapi_service
      - ./api.env:/opt/fastapi_service/.env:ro
      - ./shared_migrations:/opt/shared_migrations
      - ./fastapi_service/static:/opt/fastapi_service/app/static
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fastapi-service.entrypoints=api,websecure"
      - "traefik.http.services.fastapi-service.loadbalancer.server.port=8000"
    depends_on:
      m8_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
      auth_user_service:
        condition: service_started
    networks:
      - m8_app_network
  # ── Consumer service (optional) ───────────────────────────────────────────
  # Uncomment and configure for your own FastAPI application.
  # Set TOKEN_MODE=stateless and provide ACCESS_SECRET_KEY (HS256) or
  # ACCESS_PUBLIC_KEY (RS256/ES256) matching the auth service.
  #
  # fastapi_service:
  #   build:
  #     context: <path-to-your-service>
  #     dockerfile: ./Dockerfile
  #   env_file:
  #     - ./api.env
  #   environment:
  #     TOKEN_MODE: stateless
  #     ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY:-}
  #     REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY}
  #     ACCESS_TOKEN_ALGORITHM: ${ACCESS_TOKEN_ALGORITHM:-HS256}
  #     AUTH_PREFIX: /user
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.http.routers.fastapi-service.entrypoints=api,websecure"
  #     - "traefik.http.services.fastapi-service.loadbalancer.server.port=8000"
  #   depends_on:
  #     - auth_user_service
  #   networks:
  #     - m8_app_network

networks:
  m8_app_network:
    driver: bridge
