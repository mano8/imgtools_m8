services:
  traefik:
    image: traefik:v3.3
    ports:
      - "8000:80"
      - "4430:443"
      - "127.0.0.1:8080:8080"   # Dashboard — localhost only
      - "${API_BIND_IP:-127.0.0.1}:9000:9000"   # services entryPoint — override API_BIND_IP for LAN/public exposure
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic_conf.yml:/etc/traefik/dynamic_conf.yml:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    restart: unless-stopped
    networks:
      - m8_app_network

  m8_db:
    image: mariadb:12-ubi
    volumes:
      - ./mysql_db:/var/lib/mysql
    environment:
      - MARIADB_ALLOW_EMPTY_ROOT_PASSWORD=0
      - MARIADB_PORT_NUMBER=${DB_PORT}
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_USER=${DB_USER}
      - MARIADB_PASSWORD=${DB_PASSWORD}
      - MARIADB_DATABASE=${DB_DATABASE}
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MARIADB_PASSWORD mariadb -u $$MARIADB_USER -e 'SELECT 1' $$MARIADB_DATABASE"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - m8_app_network

  redis_cache:
    image: redis:7.4-alpine
    volumes:
      - ./redis/redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'
    command:
      - sh
      - -c
      - |
        redis-server --save 20 1 --loglevel warning --requirepass "${REDIS_PASSWORD}" &
        until redis-cli -a "${REDIS_PASSWORD}" ping 2>/dev/null | grep -q PONG; do sleep 0.2; done
        redis-cli -a "${REDIS_PASSWORD}" ACL SETUSER appuser on \>"${REDIS_PASSWORD}" "~*" +@all
        wait
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - m8_app_network

  prometheus:
    image: ubuntu/prometheus:3.11-24.04_stable
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - m8_app_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0-25530058790
    depends_on:
      - prometheus
    env_file:
      - ./grafana/config.monitoring
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - m8_app_network
    restart: unless-stopped

  auth_user_service:
    build:
      context: ../../../
      dockerfile: ./auth_user_service/Dockerfile
    env_file:
      - ./auth.env
    volumes:
      - ../../../auth_user_service:/opt/auth_user_service
      - ./auth.env:/opt/auth_user_service/.env:ro
      - ./shared_migrations:/opt/shared_migrations
      - ./auth_user/static:/opt/auth_user_service/app/static
      - ./keys:/opt/keys:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth-router.entrypoints=api,websecure"
      - "traefik.http.services.auth-router.loadbalancer.server.port=8000"
    depends_on:
      m8_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    networks:
      - m8_app_network

  fastapi_service:
    build:
      context: ../../
      dockerfile: ./fastapi_service/Dockerfile
    env_file:
      - ./api.env
    volumes:
      - ../../fastapi_service:/opt/fastapi_service
      - ./api.env:/opt/fastapi_service/.env:ro
      - ./shared_migrations:/opt/shared_migrations
      - ./fastapi_service/static:/opt/fastapi_service/app/static
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fastapi-service.entrypoints=api,websecure"
      - "traefik.http.services.fastapi-service.loadbalancer.server.port=8000"
    depends_on:
      m8_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
      auth_user_service:
        condition: service_started
    networks:
      - m8_app_network

networks:
  m8_app_network:
    driver: bridge
