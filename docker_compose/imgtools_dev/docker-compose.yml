services:
  upscaler:
    build:
      context: .
      dockerfile: Dockerfile
    image: imgtools_m8:latest
    # Use the new device_requests syntax to get all GPUs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./models:/app/models          # your EDSR_x2.pb, etc.
      - ./images:/app/images          # input/output image folders
      - ./config:/app/config          # any config files
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # ports:
    #   - "8000:8000"                  # if you expose HTTP API
    command: ["python3", "-m", "imgtools_m8.main", "--config", "/app/config/process.yml"]