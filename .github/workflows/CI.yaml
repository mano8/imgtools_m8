name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install lint tools
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r auth_user_service/requirements_dev.txt
          pip install -r examples/fastapi_service/requirements_base.txt

      - name: Type check auth_user_service
        run: mypy auth_user_service --ignore-missing-imports

      - name: Type check fastapi_service
        run: mypy examples/fastapi_service --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit (grade A — no MEDIUM/HIGH issues)
        run: bandit -r auth_user_service examples/fastapi_service --severity-level medium -f json -o bandit-report.json

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bandit-security-report
          path: bandit-report.json

      - name: Trivy filesystem scan (CRITICAL/HIGH CVEs and secrets)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: auth_user_service/requirements_dev.txt

      - name: Install dependencies
        run: pip install -r auth_user_service/requirements_dev.txt

      - name: Create test .env
        run: |
          cat > auth_user_service/.env << 'ENVEOF'
          DOMAIN=localhost
          ENVIRONMENT=local
          PROJECT_NAME=fa-auth-m8
          STACK_NAME=fa-auth-m8
          API_PREFIX=/user
          BACKEND_HOST=http://localhost:8000
          FRONTEND_HOST=http://localhost:5173
          BACKEND_CORS_ORIGINS=http://localhost:8000,http://localhost:5173
          SELECTED_DB=Mysql
          DB_HOST=localhost
          DB_PORT=3306
          DB_DATABASE=test_db
          DB_USER=test_user
          DB_PASSWORD=CiTestDb_Passw0rd
          REDIS_HOST=localhost
          REDIS_PORT=6379
          REDIS_USER=appuser
          REDIS_PASSWORD=CiTestRed_Passw0rd
          ACCESS_SECRET_KEY=CiTest-AccessKey-fa-auth2024-AbCdE
          REFRESH_SECRET_KEY=CiTest-RefreshKey-fa-auth2024-AbCd
          FIRST_SUPERUSER=ci-admin@example.com
          FIRST_SUPERUSER_PASSWORD=CiTestSup_Pass0rd
          PRIVATE_API_SECRET=CiTest-PrivateApi-fa-auth2024-AbCd
          TOKENS_ENCRYPTION_KEY=CiTest-TokensEnc-fa-auth2024-AbCd
          GOOGLE_CLIENT_ID=fake-ci-client.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET=CiTest-GoogleSecret-fa-auth2024-AbCd
          ENVEOF

      - name: Run tests
        run: pytest --cov-report=xml --cov-fail-under=100

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11' && github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          verbose: true

      - name: Upload coverage to Codacy
        if: matrix.python-version == '3.11' && github.actor != 'dependabot[bot]'
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml
