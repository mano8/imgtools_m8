# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install codecov build setuptools wheel
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
    - name: Format check with ruff
      run: |
        ruff format --check .
    - name: Lint with ruff
      run: |
        ruff check .
    - name: Test with pytest
      run: |
         coverage run -m pytest -s --cov=./ --cov-report=xml
    - name: Ls root path
      run: |
         ls /home/runner/work/imgtools_m8
    - name: Ls pytest root path
      run: |
         ls /home/runner/work/imgtools_m8/imgtools_m8
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: /home/runner/work/imgtools_m8/imgtools_m8/coverage.xml,/home/runner/work/imgtools_m8/imgtools_m8/e2e-coverage.xml
        verbose: true
