version: 2

updates:
  # GitHub Actions — keep workflow action SHAs current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"

  # Python — auth_user_service dependencies
  - package-ecosystem: "pip"
    directory: "/auth_user_service"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "deps"

  # Docker — dhi.io is not tracked by Dependabot; update manually when a new
  # dhi.io/python:3.14 patch is released or pin to a digest for reproducibility.
