version: 2

updates:
  # GitHub Actions — keep workflow action SHAs current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"

  # Python — auth_user_service dependencies
  - package-ecosystem: "pip"
    directory: "/auth_user_service"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "deps"

  # Docker — both stages use python:3.14-slim (Docker official, Dependabot-supported)
  - package-ecosystem: "docker"
    directory: "/auth_user_service"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "deps"
