[pytest]
pythonpath = .
testpaths = tests
markers =
    unit: Pure unit tests — no network, no Docker, runs in CI on every PR
    security: Adversarial unit tests — mock-based, no live stack required
    live: Requires a running Docker Compose stack — run manually or nightly
    live_security: Universal adversarial tests — run against any live stack
    live_asymmetric: Asymmetric algorithm live tests — requires RS256 or ES256
    live_hs256: HS256-specific live tests — requires ACCESS_TOKEN_ALGORITHM=HS256
    live_stateful: Stateful token mode tests — requires TOKEN_MODE=stateful
    live_hybrid: Hybrid token mode tests — requires TOKEN_MODE=hybrid
    live_stateless: Stateless token mode tests — requires TOKEN_MODE=stateless
    require_algorithm: Internal — skip if stack algorithm does not match
    require_token_mode: Internal — skip if stack token_mode does not match
    destructive: Tests that spam, flood, or aggressively modify shared state
addopts =
    --strict-markers
    --ignore=tests/live
    --cov=auth_user_service
    --cov-report=term-missing
    --cov-branch
