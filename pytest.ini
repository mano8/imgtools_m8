[pytest]
pythonpath = .
testpaths = tests
markers =
    unit: Pure unit tests — no network, no Docker, runs in CI on every PR
    security: Adversarial unit tests — mock-based, no live stack required
    live: Requires a running Docker Compose stack — run manually or nightly
    destructive: Tests that spam, flood, or aggressively modify shared state
addopts =
    --strict-markers
    --ignore=tests/live
    --cov=auth_user_service
    --cov-report=term-missing
    --cov-branch
