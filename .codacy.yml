---
engines:
  bandit:
    enabled: true
  ruff:
    enabled: true
  markdownlint:
    enabled: true
  pylint:
    enabled: false
  prospector:
    enabled: false
  pydocstyle:
    enabled: false
  pycodestyle:
    enabled: false
  pyflakes:
    enabled: false

exclude_paths:
  - "tests/**"
  - "dist/**"
  - "*.egg-info/**"
  - ".pytest_cache/**"
  - "**/__pycache__/**"
  - "**/alembic/versions/**"
  - "examples/docker_compose/**"
  - "examples/addon/package-lock.json"
